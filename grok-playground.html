<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>grok play | fornever collective</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .hidden { display: none !important; }
    .value { float: right; font-family: monospace; color: #777; }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo">GROK PLAY</div>
      <div class="nav">
        <button class="nav-btn active" data-tab="playground">🎨 Playground</button>
        <button class="nav-btn" data-tab="notes">📝 Notes</button>
        <button class="nav-btn" data-tab="theatre">🎭 Theatre Timeline</button>
      </div>
      <div class="status">
        <span class="dot"></span>
        Grok Image Playground
      </div>
    </div>

    <!-- Main Tabs -->
    <div class="main" id="playground-tab">
      <div id="preview">
        <img id="output-image" alt="Grok Output">
        <div class="placeholder">Your Grok-generated image will appear here</div>
      </div>
      <button id="generate-btn">GENERATE WITH GROK</button>
    </div>

    <div class="main hidden" id="notes-tab">
      <h2>Image Notes</h2>
      <textarea id="note-text" class="note-editor" placeholder="Write your thoughts, story, or references for this image..."></textarea>
    </div>

    <div class="main hidden" id="theatre-tab">
      <h2>Theatre.js Timeline Studio</h2>
      <div id="theatre-container">
        <p id="studio-status">Loading Theatre Studio with timeline...</p>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <h3>Prompt Studio</h3>
      <textarea id="prompt" rows="5">ethereal cybernetic angel floating in a storm of glowing particles, dramatic rim lighting, cinematic color grading, intricate details, 8k</textarea>

      <div class="slider-group">
        <label>Style Intensity <span id="val-intensity" class="value">65</span></label>
        <input type="range" id="intensity" min="0" max="100" value="65">
      </div>
      <div class="slider-group">
        <label>Surreal Factor <span id="val-surreal" class="value">45</span></label>
        <input type="range" id="surreal" min="0" max="100" value="45">
      </div>
      <div class="slider-group">
        <label>Cinematic Drama <span id="val-cinematic" class="value">82</span></label>
        <input type="range" id="cinematic" min="0" max="100" value="82">
      </div>

      <button id="save-sequence">Save Parameters to Theatre Timeline</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@theatre/studio@0.4.0/dist/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@theatre/core@0.4.0/dist/index.js"></script>
  <script src="app.js"></script>
</body>
</html>
