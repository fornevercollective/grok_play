<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>grok play | fornever collective</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <div class="logo">GROK PLAY</div>
      <div class="nav">
        <button class="nav-btn active" data-tab="playground">🎨 Playground</button>
        <button class="nav-btn" data-tab="notes">📝 Notes</button>
        <button class="nav-btn" data-tab="theatre">🎭 Theatre Timeline</button>
      </div>
      <div class="status">
        <span class="dot"></span>
        Grok Image Playground
      </div>
    </div>

    <div class="main" id="playground-tab">
      <div id="preview">
        <img id="output-image" alt="Grok Output">
        <div class="placeholder">Your image will appear here.<br>Press Generate to begin.</div>
      </div>
      <button id="generate-btn">GENERATE WITH GROK</button>
    </div>

    <div class="main hidden" id="notes-tab">
      <h2>Image Notes</h2>
      <textarea id="note-text" class="note-editor" placeholder="Write your thoughts, references, or concept..."></textarea>
    </div>

    <div class="main hidden" id="theatre-tab">
      <h2>Theatre.js Timeline</h2>
      <div id="theatre-container">
        <p id="studio-status">Loading Theatre Studio with full timeline...</p>
      </div>
    </div>

    <div class="right-panel">
      <h3>Prompt Studio</h3>
      <textarea id="prompt" rows="5"></textarea>

      <div class="slider-group">
        <label>Style Intensity <span id="val-intensity" class="value">65</span></label>
        <input type="range" id="intensity" min="0" max="100" value="65">
      </div>
      <div class="slider-group">
        <label>Surreal Factor <span id="val-surreal" class="value">45</span></label>
        <input type="range" id="surreal" min="0" max="100" value="45">
      </div>
      <div class="slider-group">
        <label>Cinematic Drama <span id="val-cinematic" class="value">80</span></label>
        <input type="range" id="cinematic" min="0" max="100" value="80">
      </div>

      <button id="save-sequence">Save to Theatre Timeline</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
