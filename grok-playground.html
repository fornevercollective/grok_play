<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok Image Playground • Fornever Collective</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/theatre.js/0.4.0/theatre.min.js"></script>
  <style>
    :root {
      --accent: #00ff9d;
      --bg: #050505;
      --panel: #0c0c0c;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: #eee;
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-columns: 260px 1fr 340px;
    }

    .sidebar {
      background: var(--panel);
      border-right: 1px solid #111;
      padding: 24px;
      display: flex;
      flex-direction: column;
    }
    .logo {
      font-size: 32px;
      font-weight: 900;
      background: linear-gradient(90deg, #00ff9d, #00cc77);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 40px;
      letter-spacing: -2px;
    }
    .nav button {
      width: 100%;
      padding: 16px 20px;
      background: #111;
      border: none;
      color: #aaa;
      text-align: left;
      margin: 8px 0;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav button.active, .nav button:hover {
      background: var(--accent);
      color: black;
      font-weight: 600;
    }

    .main {
      padding: 30px;
      background: #080808;
      display: flex;
      flex-direction: column;
    }
    #preview {
      flex: 1;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 60px rgba(0, 255, 157, 0.15);
    }
    #output-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #111;
    }
    .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 18px;
      text-align: center;
    }

    .generate-btn {
      margin-top: 20px;
      padding: 18px;
      font-size: 17px;
      font-weight: 700;
      background: linear-gradient(90deg, #00ff9d, #00dd88);
      color: black;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0, 255, 157, 0.3);
    }

    .right-panel {
      background: var(--panel);
      border-left: 1px solid #111;
      padding: 24px;
      overflow-y: auto;
    }
    .control {
      margin-bottom: 24px;
    }
    .control label {
      display: block;
      margin-bottom: 8px;
      color: var(--accent);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .note-box {
      width: 100%;
      height: 260px;
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 14px;
      color: #ddd;
      font-size: 14px;
      resize: none;
    }

    .status {
      margin-top: auto;
      padding: 12px;
      background: #111;
      border-radius: 10px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .dot { width: 9px; height: 9px; background: #00ff9d; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 50% { opacity: 0.3; } }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">GROK PLAY</div>
    <div class="nav">
      <button class="active" onclick="switchTab(0)">🎨 Playground</button>
      <button onclick="switchTab(1)">📝 Notes</button>
      <button onclick="switchTab(2)">🎭 Theatre</button>
    </div>
    <div class="status">
      <span class="dot"></span>
      Grok-2 Image Playground
    </div>
  </div>

  <!-- Main Preview -->
  <div class="main">
    <div id="preview">
      <img id="output-image" alt="Grok Generated Image">
      <div class="placeholder">Your Grok-generated image will appear here.<br><br>Press Generate to begin.</div>
    </div>
    <button class="generate-btn" onclick="generateWithGrok()">✨ Generate with Grok</button>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <h2 style="margin-bottom:20px; color:var(--accent);">Prompt Studio</h2>
    
    <div class="control">
      <label>Prompt</label>
      <textarea id="prompt" rows="5" style="width:100%; background:#111; border:1px solid #222; color:#fff; padding:12px; border-radius:10px; font-size:14px;">cinematic wide shot of a lone wanderer in a neon-lit cyberpunk alley, heavy rain, reflections, dramatic lighting, moody atmosphere, ultra detailed, 8k</textarea>
    </div>

    <div class="control">
      <label>Theatre Controls — Style Intensity <span id="val-intensity">65</span>%</label>
      <input type="range" id="intensity" min="0" max="100" value="65" oninput="updateValue(this)">
    </div>

    <div class="control">
      <label>Surreal Factor <span id="val-surreal">35</span>%</label>
      <input type="range" id="surreal" min="0" max="100" value="35" oninput="updateValue(this)">
    </div>

    <div class="control">
      <label>Cinematic Drama <span id="val-cinematic">80</span>%</label>
      <input type="range" id="cinematic" min="0" max="100" value="80" oninput="updateValue(this)">
    </div>

    <div style="margin-top:30px;">
      <label style="color:#666;">Current Note</label>
      <textarea id="note" class="note-box" placeholder="Write your thoughts about this generation..."></textarea>
    </div>
  </div>

  <script>
    let currentImage = null;
    let project, sheet;

    // Initialize Theatre.js
    function initTheatre() {
      project = theatre.getProject("Grok Image Playground");
      sheet = project.sheet("Image Parameters");
      
      const obj = sheet.object("Style", {
        intensity: 65,
        surreal: 35,
        cinematic: 80
      });

      obj.onValuesChange(values => {
        document.getElementById("intensity").value = values.intensity;
        document.getElementById("surreal").value = values.surreal;
        document.getElementById("cinematic").value = values.cinematic;
        updateValue({id:"intensity", value:values.intensity});
        updateValue({id:"surreal", value:values.surreal});
        updateValue({id:"cinematic", value:values.cinematic});
      });
    }

    function updateValue(el) {
      document.getElementById(`val-${el.id}`).textContent = el.value;
    }

    async function generateWithGrok() {
      const prompt = document.getElementById("prompt").value;
      const output = document.getElementById("output-image");
      const placeholder = document.querySelector(".placeholder");

      placeholder.style.display = "none";
      output.style.display = "block";
      
      // Simulate Grok generation (replace with real API call later)
      output.src = `https://picsum.photos/id/${Math.floor(Math.random()*900)+100}/1200/1200?random=${Date.now()}`;

      currentImage = output.src;
      
      // Auto-save note with metadata
      const noteText = document.getElementById("note").value || "No note yet.";
      console.log(`%c[Grok] Image generated with prompt: ${prompt}\nNote: ${noteText}`, "color:#00ff9d");
    }

    function switchTab(tab) {
      document.querySelectorAll('.nav button').forEach((btn, i) => {
        btn.classList.toggle('active', i === tab);
      });
      // You can expand this later with more tab content
      console.log(`Switched to tab ${tab}`);
    }

    // Keyboard support
    document.addEventListener("keydown", e => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        generateWithGrok();
      }
    });

    // Initialize everything
    window.onload = () => {
      initTheatre();
      console.log("%cFornever Collective • Grok Image Playground + Theatre.js + Notes Ready", "color:#00ff9d; font-size:15px; font-weight:bold");
    };
  </script>
</body>
</html>
